<!DOCTYPE html>
<html>
<head>
<title>Builder Rich Text Funcțional</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
    margin:0;
    font-family: Georgia, serif;
    background:#f5f5f5;
    color:#222;
}
.editor-layout { display:flex; height:100vh; }
.sidebar { width:30%; padding:10px; border-right:1px solid #ccc; background:#fff; overflow-y:auto; }
.sidebar-block { border:1px solid #ccc; padding:8px; margin-bottom:5px; cursor:pointer; background:#fafafa; }
.canvas { width:70%; padding:20px; overflow-y:auto; }
#dropzone .block { border:1px solid #ccc; padding:10px; margin-bottom:20px; background:#fff; position:relative; }
.delete-btn { position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; }
.toolbar { margin-bottom:5px; }
.toolbar button, .toolbar input[type="color"] { margin-right:5px; cursor:pointer; }
.editor { min-height:50px; font-size:17px; line-height:1.7; color:#222; font-family: Georgia, serif; margin-top:5px; padding:5px; border:1px solid #ddd; }
.editor h1, .editor h2, .editor h3 { font-weight:bold; margin-top:25px; margin-bottom:15px; }
.editor p { margin-bottom:18px; }
.editor p strong, .editor p b { font-weight:bold; }
.editor .abstract, .editor .rezumat { font-style:italic; background-color:#f9f9f9; border-left:4px solid #ccc; padding:15px; margin-bottom:25px; }
</style>
</head>
<body>

<div class="editor-layout">

    <div class="sidebar">
        <h3>Blocuri PDF</h3>
        {% for b in blocks %}
        <div class="sidebar-block" onclick="addBlock('{{b.text|safe}}')">{{ b.text[:100] }}</div>
        {% endfor %}
    </div>

    <div class="canvas">
        <h2>Editor (drag & drop)</h2>
        <div id="dropzone"></div>
        <br>
        <button onclick="save()">💾 Save</button>
    </div>

</div>

<script>
let dropzone = document.getElementById("dropzone");
let activeEditor = null;

// Drag & drop
new Sortable(dropzone, { animation:150 });

// Adauga bloc
function addBlock(text){
    let div = document.createElement("div");
    div.className = "block";

    div.innerHTML = `
        <button class="delete-btn" onclick="deleteBlock(this)">X</button>
        <div class="toolbar">
            <button onmousedown="execCmd('bold')"><b>B</b></button>
            <button onmousedown="execCmd('italic')"><i>I</i></button>
            <button onmousedown="execCmd('underline')"><u>U</u></button>
            <button onmousedown="execCmd('superscript')">X²</button>
            <input type="color" oninput="execCmdColor(this.value)" title="Culoare text">
            <button onmousedown="insertHTML('<br>')">Enter</button>
            <button onmousedown="insertHTML('&nbsp;&nbsp;&nbsp;&nbsp;')">Tab</button>
        </div>
        <div contenteditable="true" class="editor" onfocus="activeEditor=this">${text}</div>
    `;

    dropzone.appendChild(div);
}

// Sterge bloc
function deleteBlock(btn){ btn.parentElement.remove(); }

// Executa format
function execCmd(command){
    if(activeEditor){
        activeEditor.focus();
        document.execCommand(command,false,null);
    }
}

// Color picker
function execCmdColor(color){
    if(activeEditor){
        activeEditor.focus();
        document.execCommand('foreColor', false, color);
    }
}

// Insert HTML
function insertHTML(html){
    if(activeEditor){
        activeEditor.focus();
        document.execCommand('insertHTML', false, html);
    }
}

// Salvare articole
function save(){
    let data=[];
    document.querySelectorAll("#dropzone .block").forEach(b=>{
        let html = b.querySelector(".editor").innerHTML;
        data.push({html:html});
    });

    let form=document.createElement("form");
    form.method="POST";
    form.action="/save";

    let input=document.createElement("input");
    input.type="hidden";
    input.name="data";
    input.value=JSON.stringify(data);

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
