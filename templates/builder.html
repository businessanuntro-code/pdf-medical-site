<!DOCTYPE html>
<html>
<head>
<title>Builder Quill Rich Text</title>

<!-- Quill CSS -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">

<!-- Sortable.js -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body { margin:0; font-family: Georgia, serif; background:#f5f5f5; color:#222; }
.editor-layout { display:flex; height:100vh; }
.sidebar { width:30%; padding:10px; border-right:1px solid #ccc; background:#fff; overflow-y:auto; }
.sidebar-block { border:1px solid #ccc; padding:8px; margin-bottom:5px; cursor:pointer; background:#fafafa; }
.canvas { width:70%; padding:20px; overflow-y:auto; }
.block { border:1px solid #ccc; padding:5px; margin-bottom:20px; background:#fff; position:relative; }
.delete-btn { position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:3px; padding:2px 6px; cursor:pointer; }
.quill-container { height:150px; }
</style>

</head>
<body>

<div class="editor-layout">

    <div class="sidebar">
        <h3>Blocuri PDF</h3>
        {% for b in blocks %}
        <div class="sidebar-block" onclick="addBlock('{{b.text|safe}}')">{{ b.text[:100] }}</div>
        {% endfor %}
    </div>

    <div class="canvas">
        <h2>Editor (drag & drop)</h2>
        <div id="dropzone"></div>
        <br>
        <button onclick="save()">💾 Save</button>
    </div>

</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.7/quill.js"></script>

<script>
let dropzone = document.getElementById("dropzone");
let quills = []; // Array pentru toate editor-urile

// Drag & drop
new Sortable(dropzone, { animation:150 });

// Adauga bloc
function addBlock(text){
    let div = document.createElement("div");
    div.className = "block";

    // ID unic pentru fiecare editor
    let editorId = 'editor-' + Date.now();

    div.innerHTML = `
        <button class="delete-btn" onclick="deleteBlock(this)">X</button>
        <div id="${editorId}" class="quill-container"></div>
    `;

    dropzone.appendChild(div);

    // Initializeaza Quill pentru acest editor
    let quill = new Quill('#' + editorId, {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline', { 'script': 'super' }],
                [{ 'color': [] }],
                [{ 'indent': '-1'}, { 'indent': '+1' }],
                ['clean']
            ]
        }
    });

    // Daca vine text initial, il setam
    quill.root.innerHTML = text;

    quills.push({id:editorId, quill:quill});
}

// Sterge bloc
function deleteBlock(btn){
    let block = btn.parentElement;
    // Sterge Quill din array
    quills = quills.filter(q => !block.contains(document.getElementById(q.id)));
    block.remove();
}

// Salvare articole
function save(){
    let data = [];
    quills.forEach(q=>{
        let html = q.quill.root.innerHTML;
        data.push({html: html});
    });

    let form = document.createElement("form");
    form.method = "POST";
    form.action = "/save";

    let input = document.createElement("input");
    input.type = "hidden";
    input.name = "data";
    input.value = JSON.stringify(data);

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
