<!DOCTYPE html>
<html>
<head>
<title>Builder simplificat</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
/* ───────── BODY & LAYOUT ───────── */
body {
    margin:0;
    font-family: Georgia, serif;
    background:#f5f5f5;
}

.editor-layout {
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar {
    width:30%;
    padding:10px;
    border-right:1px solid #ccc;
    background:#fff;
    overflow-y:auto;
}

.sidebar-block {
    border:1px solid #ccc;
    padding:8px;
    margin-bottom:5px;
    cursor:pointer;
    background:#fafafa;
}

/* Canvas */
.canvas {
    width:70%;
    padding:20px;
    overflow-y:auto;
}

#dropzone .block {
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:20px;
    background:#fff;
    position: relative; /* pentru butonul X */
}

/* Buton stergere */
.delete-btn {
    position: absolute;
    top:5px;
    right:5px;
    background:red;
    color:white;
    border:none;
    border-radius:3px;
    padding:2px 6px;
    cursor:pointer;
}

/* Editor content */
.editor {
    min-height:50px;
    font-size:17px;
    line-height:1.7;
    color:#222;
    font-family: Georgia, serif;
    margin-top:5px;
    padding:5px;
    border:1px solid #ddd;
}

/* Titluri și paragrafe */
.editor h1, .editor h2, .editor h3 {
    font-weight:bold;
    margin-top:25px;
    margin-bottom:15px;
}

.editor p {
    margin-bottom:18px;
}

.editor p strong, .editor p b {
    font-weight:bold;
}

/* Abstract / Rezumat */
.editor .abstract, .editor .rezumat {
    font-style:italic;
    background-color:#f9f9f9;
    border-left:4px solid #ccc;
    padding:15px;
    margin-bottom:25px;
}
</style>
</head>
<body>

<div class="editor-layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Blocuri PDF</h3>
        {% for b in blocks %}
        <div class="sidebar-block" onclick="addBlock('{{b.text|safe}}')">
            {{ b.text[:100] }}
        </div>
        {% endfor %}
    </div>

    <!-- Canvas -->
    <div class="canvas">
        <h2>Editor (drag & drop)</h2>
        <div id="dropzone"></div>
        <br>
        <button onclick="save()">💾 Save</button>
    </div>

</div>

<script>
let dropzone = document.getElementById("dropzone");

// Drag & drop cu Sortable.js
new Sortable(dropzone, {
    animation:150
});

// Adauga bloc in canvas
function addBlock(text){
    let div = document.createElement("div");
    div.className = "block";

    div.innerHTML = `
        <button class="delete-btn" onclick="deleteBlock(this)">X</button>
        <div contenteditable="true" class="editor">${text}</div>
    `;

    dropzone.appendChild(div);
}

// Sterge bloc
function deleteBlock(btn){
    btn.parentElement.remove();
}

// Salvare articole
function save(){
    let data=[];
    document.querySelectorAll("#dropzone .block").forEach(b=>{
        let html=b.querySelector(".editor").innerHTML;
        data.push({html:html});
    });

    let form=document.createElement("form");
    form.method="POST";
    form.action="/save";

    let input=document.createElement("input");
    input.type="hidden";
    input.name="data";
    input.value=JSON.stringify(data);

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
