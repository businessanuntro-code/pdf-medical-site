<!DOCTYPE html>
<html>
<head>
<title>Builder</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="editor-layout">

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>Blocuri PDF</h3>

    {% for b in blocks %}
    <div class="sidebar-block" onclick="addBlock('{{b.text|safe}}')">
        {{ b.text[:100] }}
    </div>
    {% endfor %}
</div>

<!-- CANVAS -->
<div class="canvas">

<div class="topbar">
    <button onclick="save()">💾 Salvează</button>
</div>

<div id="dropzone"></div>

</div>

</div>

<script>
let dropzone = document.getElementById("dropzone");

new Sortable(dropzone, { animation: 150 });

function addBlock(text) {
    let div = document.createElement("div");
    div.className = "block";

    div.innerHTML = `
        <div class="toolbar">
            <button onclick="cmd(event,'bold')">B</button>
            <button onclick="cmd(event,'italic')">I</button>
            <button onclick="cmd(event,'underline')">U</button>
            <button onclick="cmd(event,'superscript')">X²</button>
        </div>
        <div contenteditable="true" class="editor">${text}</div>
    `;

    dropzone.appendChild(div);
}

function cmd(e, c) {
    e.preventDefault();
    document.execCommand(c);
}

function save() {
    let data = [];

    document.querySelectorAll(".editor").forEach(e => {
        data.push({html: e.innerHTML});
    });

    let form = document.createElement("form");
    form.method = "POST";
    form.action = "/save";

    let input = document.createElement("input");
    input.type = "hidden";
    input.name = "data";
    input.value = JSON.stringify(data);

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
}
</script>

</body>
</html>
