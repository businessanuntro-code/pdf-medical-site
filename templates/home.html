<!DOCTYPE html>
<html>
<head>
    <title>PDF Medical Site - Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1, h3 { color:#222; }
        a { text-decoration:none; color:#007bff; font-weight:bold; }
        .container { max-width: 800px; margin:auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        .button { display:inline-block; margin-top:15px; padding:10px 20px; background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer; text-decoration:none; }
        ul { padding-left:20px; }
        li { margin-bottom:8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Bine ai venit pe PDF Medical Site</h1>
    <p>Aici poți încărca fișiere PDF pentru a genera articole medicale structurate.</p>

    <a href="/upload" class="button">Upload PDF</a>

    <hr style="margin:30px 0;">

    <h3>Articole generate</h3>
    {% if articles %}
    <ul>
        {% for a in articles %}
        <li>
            <a href="{{ url_for('view', slug=a.slug) }}" target="_blank">{{ a.pdf_filename }}</a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>❌ Nu există articole generate încă.</p>
    {% endif %}
</div>

</body>
</html>
