<!DOCTYPE html>
<html>
<head>
<style>

body {
    background: #d9d9d9;
}

.page {
    width: 210mm;
    height: 297mm;
    margin: auto;
    background: white;
    position: relative;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.frame {
    position: absolute;
    box-sizing: border-box;
    overflow: hidden;
}

img {
    max-width: 100%;
    display: block;
}

</style>
</head>
<body>

<div class="page">
    {{ content | safe }}
</div>

</body>
</html>
