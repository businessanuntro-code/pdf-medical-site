<!DOCTYPE html>
<html>
<head>
<title>PDF Mapper PRO</title>

<style>
body { display:flex; font-family:Arial; margin:0; }
#left { width:70%; position:relative; }
#right { width:30%; padding:10px; border-left:1px solid #ccc; overflow:auto; }

canvas { border:1px solid #000; cursor:crosshair; }

.zone { border:1px solid #ccc; padding:5px; margin-bottom:5px; }

.preview { background:#f5f5f5; padding:5px; margin-top:5px; font-size:12px; }
</style>
</head>
<body>

<div id="left">
    <canvas id="pdfCanvas"></canvas>
</div>

<div id="right">
    <h3>Zone</h3>

    <select id="zoneType">
        <option value="title">Titlu</option>
        <option value="authors">Autori</option>
        <option value="abstract">Abstract</option>
        <option value="keywords">Keywords</option>
        <option value="rezumat">Rezumat</option>
        <option value="cuvinte_cheie">Cuvinte cheie</option>
        <option value="body">Body</option>
        <option value="bibliografie">Bibliografie</option>
    </select>

    <button onclick="saveZones()">💾 Save Template</button>

    <h4>Zone definite</h4>
    <div id="zones"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
let url = "{{ pdf_url }}";

let canvas = document.getElementById('pdfCanvas');
let ctx = canvas.getContext('2d');

let startX, startY;
let zones = [];

pdfjsLib.getDocument(url).promise.then(pdf=>{
    pdf.getPage(1).then(page=>{
        let viewport = page.getViewport({scale:1.5});
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        page.render({canvasContext:ctx, viewport:viewport});
    });
});

canvas.onmousedown = e=>{
    startX = e.offsetX;
    startY = e.offsetY;
};

canvas.onmouseup = e=>{
    let endX = e.offsetX;
    let endY = e.offsetY;

    let type = document.getElementById("zoneType").value;

    zones.push({type, x0:startX, y0:startY, x1:endX, y1:endY});

    drawZones();
    renderZones();
};

function drawZones(){
    ctx.strokeStyle="red";
    ctx.lineWidth=2;

    zones.forEach(z=>{
        ctx.strokeRect(z.x0, z.y0, z.x1-z.x0, z.y1-z.y0);
    });
}

function renderZones(){
    let div = document.getElementById("zones");
    div.innerHTML="";

    zones.forEach(z=>{
        div.innerHTML+=`
        <div class="zone">
            <b>${z.type}</b><br>
            (${Math.round(z.x0)},${Math.round(z.y0)}) → (${Math.round(z.x1)},${Math.round(z.y1)})
        </div>`;
    });
}

function saveZones(){
    fetch("/save_template", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:"default",
            zones:zones
        })
    }).then(()=>alert("Template salvat"));
}
</script>

</body>
</html>
