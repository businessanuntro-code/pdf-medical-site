<!DOCTYPE html>
<html>
<head>
    <title>Mapper PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        #pdf-canvas { border:1px solid #ccc; width:100%; }
        .overlay { position:absolute; border:2px dashed red; pointer-events:none; }
        #canvas-container { position:relative; }
        select, button { margin:5px 0; }
    </style>
</head>
<body>

<h1>Mapper PDF</h1>

<div>
    <label>Alege tip câmp:</label>
    <select id="field-type">
        {% for f in field_types %}
            <option value="{{f}}">{{f}}</option>
        {% endfor %}
    </select>
    <button onclick="saveTemplate()">Salvează Template</button>
</div>

<div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
</div>

<script>
let pdfUrl = "{{ pdf_url }}";
let canvas = document.getElementById('pdf-canvas');
let ctx = canvas.getContext('2d');
let template = [];

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.worker.min.js';

pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
    pdf.getPage(1).then(page => {
        let viewport = page.getViewport({ scale: 1.5 });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        page.render({ canvasContext: ctx, viewport: viewport });
    });
});

// Simplu click pentru coordonate (X0,Y0,X1,Y1)
canvas.addEventListener('click', function(e){
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;
    let w = 200; // lățimea selecției
    let h = 50;  // înălțimea selecției
    template.push({
        x0: x,
        y0: y,
        x1: x + w,
        y1: y + h,
        type: document.getElementById('field-type').value
    });
    // Vizualizare chenar
    let div = document.createElement('div');
    div.className = 'overlay';
    div.style.left = x+'px';
    div.style.top = y+'px';
    div.style.width = w+'px';
    div.style.height = h+'px';
    document.getElementById('canvas-container').appendChild(div);
});

function saveTemplate(){
    fetch('/save_template', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(template)
    }).then(r=>alert('Template salvat!'));
}
</script>

</body>
</html>
