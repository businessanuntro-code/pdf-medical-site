<!DOCTYPE html>
<html>
<head>
<title>Mapper</title>

<style>
body { display:flex; }
#left { width:70%; }
#right { width:30%; padding:10px; }
canvas { border:1px solid black; }
</style>
</head>
<body>

<div id="left">
    <canvas id="pdfCanvas"></canvas>
</div>

<div id="right">

<select id="type">
<option value="title">Titlu</option>
<option value="authors">Autori</option>
<option value="abstract">Abstract</option>
<option value="keywords">Keywords</option>
<option value="body">Body</option>
<option value="bibliografie">Bibliografie</option>
</select>

<button onclick="save()">Save</button>
<button onclick="generate()">➡️ Generează articol</button>

<div id="zones"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>
let url = "{{ pdf_url }}";

let canvas = document.getElementById("pdfCanvas");
let ctx = canvas.getContext("2d");

let zones = [];
let startX, startY;

pdfjsLib.getDocument(url).promise.then(pdf=>{
    pdf.getPage(1).then(page=>{
        let viewport = page.getViewport({scale:1.5});
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        page.render({canvasContext:ctx, viewport:viewport});
    });
});

canvas.onmousedown = e=>{
    startX = e.offsetX;
    startY = e.offsetY;
};

canvas.onmouseup = e=>{
    let z = {
        type: document.getElementById("type").value,
        x0:startX,
        y0:startY,
        x1:e.offsetX,
        y1:e.offsetY
    };

    zones.push(z);
    draw();
};

function draw(){
    ctx.strokeStyle="red";
    zones.forEach(z=>{
        ctx.strokeRect(z.x0, z.y0, z.x1-z.x0, z.y1-z.y0);
    });
}

function save(){
    fetch("/save_template", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(zones)
    }).then(()=>alert("salvat"));
}

function generate(){
    window.location.href="/generate";
}
</script>

</body>
</html>
