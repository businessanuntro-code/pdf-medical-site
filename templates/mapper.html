<!DOCTYPE html>
<html>
<head>
    <title>Mapper PDF</title>
    <style>
        body { margin:0; font-family: Arial; }
        #pdf-container { width:80%; height:90vh; margin:auto; border:1px solid #ccc; position:relative; }
        canvas { border:1px solid #999; display:block; margin:auto; }
        .selection { border:2px dashed red; position:absolute; pointer-events:none; }
        button { margin:10px; padding:10px; background:#007bff; color:white; border:none; cursor:pointer; border-radius:4px; }
    </style>
</head>
<body>

<h2 style="text-align:center">Mapper - Selectează zone PDF</h2>
<div id="pdf-container"></div>
<div style="text-align:center;">
    <button onclick="saveTemplate()">Salvează coordonate</button>
    <a href="/generate" target="_blank"><button>Generează articol</button></a>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.100/pdf.min.js"></script>
<script>
const pdf_url = "{{ pdf_url }}";
const container = document.getElementById("pdf-container");
let template_data = [];

let startX, startY, rectEl;

// Încarcă PDF
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.10.100/pdf.worker.min.js";
pdfjsLib.getDocument(pdf_url).promise.then(pdf => {
    pdf.getPage(1).then(page => {
        const viewport = page.getViewport({scale:1.5});
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        container.appendChild(canvas);
        page.render({canvasContext: ctx, viewport: viewport});
        
        // Mouse pentru selectare coordonate
        canvas.addEventListener("mousedown", e=>{
            startX = e.offsetX;
            startY = e.offsetY;
            rectEl = document.createElement("div");
            rectEl.className = "selection";
            rectEl.style.left = startX+"px";
            rectEl.style.top = startY+"px";
            rectEl.style.width = "0px";
            rectEl.style.height = "0px";
            container.appendChild(rectEl);
        });

        canvas.addEventListener("mousemove", e=>{
            if(rectEl){
                rectEl.style.width = (e.offsetX - startX)+"px";
                rectEl.style.height = (e.offsetY - startY)+"px";
            }
        });

        canvas.addEventListener("mouseup", e=>{
            if(rectEl){
                const x0 = startX, y0 = startY;
                const x1 = e.offsetX, y1 = e.offsetY;
                let type = prompt("Tipul zonei (ex: title, abstract, keywords):");
                template_data.push({x0,y0,x1,y1,type});
                rectEl = null;
            }
        });
    });
});

function saveTemplate(){
    fetch("/save_template", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(template_data)
    }).then(r=>r.text()).then(alert);
}
</script>
</body>
</html>
