<!DOCTYPE html>
<html>
<head>
    <title>Mapper PDF Avansat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        #canvas-container { position: relative; border:1px solid #ccc; display:inline-block; }
        canvas { display:block; background:#fff; }
        .overlay { position:absolute; border:2px dashed red; pointer-events:none; }
        #controls { margin-bottom:10px; }
        button, select { margin:5px; padding:5px 10px; }
    </style>
</head>
<body>

<h1>Mapper PDF</h1>

<div id="controls">
    <label>Tip câmp:</label>
    <select id="field-type">
        {% for f in field_types %}
            <option value="{{f}}">{{f}}</option>
        {% endfor %}
    </select>

    <button onclick="saveTemplate()">Salvează Template</button>
    <button onclick="generateArticle()">Generează Articol</button>
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
</div>

<div id="canvas-container">
    <canvas id="pdf-canvas"></canvas>
</div>

<script>
let pdfUrl = "{{ pdf_url }}";
let canvas = document.getElementById('pdf-canvas');
let ctx = canvas.getContext('2d');
let container = document.getElementById('canvas-container');

let template = [];
let pdfDoc = null;
let scale = 1.5;
let viewport = null;

// Selectie chenar
let isDrawing = false;
let startX, startY;
let currentOverlay = null;

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.worker.min.js';

// Load PDF
pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
    pdfDoc = pdf;
    renderPage(1);
});

// Functie render PDF
function renderPage(pageNumber) {
    pdfDoc.getPage(pageNumber).then(page => {
        viewport = page.getViewport({scale: scale});
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        let renderContext = { canvasContext: ctx, viewport: viewport };
        page.render(renderContext);
    });
}

// Mouse events pentru tras chenar
canvas.addEventListener('mousedown', (e)=>{
    isDrawing = true;
    let rect = canvas.getBoundingClientRect();
    startX = e.clientX - rect.left;
    startY = e.clientY - rect.top;

    currentOverlay = document.createElement('div');
    currentOverlay.className = 'overlay';
    currentOverlay.style.left = startX+'px';
    currentOverlay.style.top = startY+'px';
    container.appendChild(currentOverlay);
});

canvas.addEventListener('mousemove', (e)=>{
    if(!isDrawing) return;
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    currentOverlay.style.width = Math.abs(x-startX)+'px';
    currentOverlay.style.height = Math.abs(y-startY)+'px';
    currentOverlay.style.left = Math.min(x,startX)+'px';
    currentOverlay.style.top = Math.min(y,startY)+'px';
});

canvas.addEventListener('mouseup', (e)=>{
    if(!isDrawing) return;
    isDrawing = false;
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    template.push({
        x0: Math.min(startX,x)/scale,
        y0: Math.min(startY,y)/scale,
        x1: Math.max(startX,x)/scale,
        y1: Math.max(startY,y)/scale,
        type: document.getElementById('field-type').value
    });
});

// Zoom
function zoomIn(){ scale += 0.25; renderPage(1);}
function zoomOut(){ if(scale>0.5){scale -= 0.25; renderPage(1);}}

// Salvare template
function saveTemplate(){
    fetch('/save_template',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(template)
    }).then(r=>alert('Template salvat!'));
}

// Genereaza articol intr-un tab nou
function generateArticle(){
    fetch('/save_template',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(template)
    }).then(()=>{
        window.open('/generate', '_blank');
    });
}
</script>

</body>
</html>
